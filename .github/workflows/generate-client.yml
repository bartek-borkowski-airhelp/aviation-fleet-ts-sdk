name: Generate TypeScript Client

on:
  repository_dispatch:
    types: [openapi-schema-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install openapi-typescript
        run: npm install -D openapi-typescript typescript

      - name: Fetch OpenAPI schema
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.AVIATION_FLEET_PAT }}" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/bartek-borkowski-airhelp/aviation-fleet/contents/swagger/v1/swagger.yaml?ref=${{ github.event.client_payload.sha }}" \
            -o openapi-schema.yaml

      - name: Generate TypeScript types
        run: npx openapi-typescript ./openapi-schema.yaml -o ./src/schema.d.ts

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate TypeScript client from OpenAPI schema"
          title: "chore: regenerate TypeScript client from OpenAPI schema"
          body: |
            Auto-generated TypeScript types from updated OpenAPI schema.

            Source: `bartek-borkowski-airhelp/aviation-fleet` @ `${{ github.event.client_payload.sha }}` (`${{ github.event.client_payload.ref }}`)
          branch: chore/regenerate-openapi-types
          delete-branch: true

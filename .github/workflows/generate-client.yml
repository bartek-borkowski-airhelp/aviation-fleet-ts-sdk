name: Generate TypeScript Client

on:
  repository_dispatch:
    types: [openapi-schema-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install openapi-typescript
        run: npm install -D openapi-typescript typescript

      - name: Generate TypeScript types
        run: npx openapi-typescript "${{ github.event.client_payload.schema_url }}" -o ./src/schema.d.ts

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate TypeScript client from OpenAPI schema"
          title: "chore: regenerate TypeScript client from OpenAPI schema"
          body: |
            Auto-generated TypeScript types from updated OpenAPI schema.

            Schema URL: `${{ github.event.client_payload.schema_url }}`
          branch: chore/regenerate-openapi-types
          delete-branch: true
